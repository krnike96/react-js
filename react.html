<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ReactJS</title>
</head>

<body>
	<div class="root">

	</div>

	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

	<script type="text/babel" data-type="module">
		import React from 'https://esm.sh/react@19?dev';
		import ReactDOM from 'https://esm.sh/react-dom@19/client?dev';

		/*
		const userData = [
			{
				name: "Niket",
				phone: "123456789",
				age: "21",
				id: crypto.randomUUID()
			},
			{
				name: "Harry",
				phone: "123453789",
				age: "22",
				id: crypto.randomUUID()
			},
			{
				name: "Alice",
				phone: "123456289",
				age: "24",
				id: crypto.randomUUID()
			}

		];
		*/
		function Counter() {
			const [count, setCount] = React.useState(0);
			const handleIncrease = () => setCount(count => count + 1);
			const handleReset = () => setCount(0);
			return (
				<>
					<button onClick={handleIncrease}>Count : {count}</button>
					<button onClick={handleReset}> Reset</button>
				</>
			);
		}

		function Card({ id, name, phone, age, style, handleDeleteUser }) {
			return (
				<div style={style}>
					<h1> Name : {name} </h1>
					<h1> Phone : {phone} </h1>
					<h1> Age : {age}</h1>
					<button onClick={() => handleDeleteUser(id)}>Delete - {id}</button>
				</div>
			);
		}

		function InputComponent({ style, inputData, searchTerm, handleSubmit, handleAddSearchData, handleAddUser }) {
			return (
				<div style={style}>
					<input
						type='text'
						placeholder="Search"
						value={searchTerm}
						onChange={handleAddSearchData}
					/>
					<input
						type='text'
						name='name'
						placeholder='Enter Name'
						value={inputData.name}
						onChange={handleAddUser}
					/>
					<input
						type='number'
						name='phone'
						placeholder='Enter Phone'
						value={inputData.phone}
						onChange={handleAddUser}
					/>
					<input
						type='number'
						name='age'
						placeholder='Enter Age'
						value={inputData.age}
						onChange={handleAddUser}
					/>
					<button onClick={handleSubmit}>Submit</button>
				</div>
			);
		}

		function App() {
			const style = {
				border: '1px solid #ddd',
				padding: '20px',
				margin: '10px 0',
				borderRadius: '8px',
				backgroundColor: '#f9f9f9',
			};

			const [showUser, setShowUser] = React.useState(true);
			const [users, setUsers] = React.useState([]);
			const [isLoading, setIsLoading] = React.useState(true);
			const [searchTerm, setSearchTerm] = React.useState('');
			const [inputData, setInputData] = React.useState({
				name: '',
				phone: '',
				age: '',
				id: crypto.randomUUID()
			});

			const handleUserVisibility = () => setShowUser(!showUser);

			const handleDeleteUser = (idToDelete) => {
				setUsers(users.filter(user => user.id !== idToDelete));
			}

			const handleAddUser = (e) => {
				const { name, value } = e.target;
				setInputData({ ...inputData, [name]: value });
			}

			const handleSubmit = () => {
				if (inputData.name.trim() === '') return;
				setUsers([...users, inputData]);
				setInputData({ name: '', phone: '', age: '', id: crypto.randomUUID() });
			}

			React.useEffect(() => {
				fetch('https://jsonplaceholder.typicode.com/users')
					.then(res => res.json())
					.then(data => {
						setIsLoading(false);
						setUsers(data);
					})
					.catch(err => {
						console.error("Failed to fetch", err);
						setIsLoading(false);
					});
			}, []);

			const filteredUsers = users.filter(user =>
				user.name.toLowerCase().includes(searchTerm.toLowerCase())
			);

			let content;
			if (!showUser) {
				content = null;
			} else if (filteredUsers.length > 0) {
				content = filteredUsers.map((user) => (
					<Card
						key={user.id}
						{...user}
						style={style}
						handleDeleteUser={handleDeleteUser}
					/>
				));
			} else {
				content = <p>No users found matching "{searchTerm}"</p>;
			}

			return (
				<>
					<Counter />
					{isLoading ? <p>Loading User Data...</p> : (
						<>
							<button onClick={handleUserVisibility}>
								{showUser ? 'Hide Users' : 'Show Users'}
							</button>
							<InputComponent
								style={style}
								inputData={inputData}
								searchTerm={searchTerm}
								handleAddSearchData={(e) => setSearchTerm(e.target.value)}
								handleAddUser={handleAddUser}
								handleSubmit={handleSubmit}
							/>
							{content}
						</>
					)}
				</>
			);
		}
		const root = document.querySelector('.root');
		ReactDOM.createRoot(root).render(<App />)
	</script>
</body>

</html>
